version: 1.1.4

cache: true

endpoints:
  openAI:
    disabled: true
  azureOpenAI:
    disabled: true
  google:
    disabled: true
  anthropic:
    disabled: true

  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "anthropic/claude-sonnet-4-5"
          - "anthropic/claude-opus-4"
          - "anthropic/claude-haiku-4-5"
          - "openai/gpt-4o"
          - "openai/gpt-4o-mini"
          - "google/gemini-2.0-flash-001"
          - "meta-llama/llama-3.3-70b-instruct"
        fetch: false
      titleConvo: true
      titleModel: "openai/gpt-4o-mini"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Magnolia OS"
      headers:
        HTTP-Referer: "${DOMAIN_CLIENT}"
        X-Title: "Magnolia OS"
